name: dorousi
description: "Dourousi (دروسي) - EdTech platform for students in Morocco"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Design & Fonts ---
  google_fonts: ^6.1.0

  # --- State Management ---
  provider: ^6.1.2

  # --- Routing ---
  go_router: ^14.8.1

  # --- Networking & Connectivity ---
  connectivity_plus: ^6.1.4
  http: ^1.3.0

  # --- External Links (Zoom) ---
  url_launcher: ^6.3.1

  # --- Local Storage / Session Persistence ---
  shared_preferences: ^2.3.5

  # --- UI Utilities ---
  shimmer: ^3.0.0              # Loading skeleton effects
  cached_network_image: ^3.4.1 # Cached images for avatars & banners
  flutter_svg: ^2.0.17         # SVG support for icons/illustrations
  lottie: ^3.3.1               # Lottie animations (splash, success, etc.)
  intl: ^0.20.2                # Date/time formatting (Arabic locale)
  badges: ^3.1.2               # Notification badge on icons
  smooth_page_indicator: ^1.2.0+3 # Carousel page indicators

  # --- Video Player ---
  video_player: ^2.9.2
  chewie: ^1.8.1

  # --- Image Picker (Profile editing) ---
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/animations/
